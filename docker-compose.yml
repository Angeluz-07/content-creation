  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: qdrant_vector_db
    restart: always
    ports:
      - "6333:6333" # API REST y Web Dashboard
      - "6334:6334" # gRPC (por si lo necesitas más adelante)
    environment:
      - QDRANT__SERVICE__ENABLE_PROFILING=true
    volumes:
      - ./.qdrant_data:/qdrant/storage:z
    deploy:
      resources:
        limits:
          cpus: "0.50" # Máximo 50% de un núcleo de CPU
          memory: 512M # Máximo 512MB de RAM (ideal para tus colecciones de testing)
        reservations:
          memory: 128M # Garantiza al menos 128MB
    profiles:
      - base
  prefect-server:
    image: prefecthq/prefect:3-python3.13
    container_name: prefect_server
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_SERVER_API_HOST=0.0.0.0
      # Opcional: Desactivar telemetría si buscas máxima privacidad local
      - PREFECT_ANALYTICS_ENABLED=false
      - PREFECT_UI_API_URL=http://localhost:4200/api
    ports:
      - "4200:4200"
    volumes:
      - ./.prefect_data:/root/.prefect
    deploy:
      resources:
        limits:
          cpus: "0.50" # Máximo 50% de un núcleo de CPU
          memory: 512M # Máximo 512MB de RAM (ideal para tus colecciones de testing)
        reservations:
          memory: 128M # Garantiza al menos 128MB
    profiles:
      - base

  # --- Custom Services ---
  embedding_api:
    image: angeluz07/cc-embedding:0.0.2 # use local if exists
    build:
      context: .
      dockerfile: ./deploy/api/embedding/Dockerfile
    container_name: embedding_api
    ports:
      - "8001:8001"
    environment:
      - UVICORN_RELOAD=${UVICORN_RELOAD:-true}
    volumes:
      - ./src:/app/src:z
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 1.5G
        reservations:
          cpus: "1"
          memory: 0.5G
    profiles:
      - custom
  production_api:
    image: angeluz07/cc-production:0.0.1 # use local if exists
    build: # if doesnt, build it
      context: .
      dockerfile: ./deploy/api/production/Dockerfile
    container_name: production_api
    ports:
      - "8000:8000"
    extra_hosts:
      - "localhost:host-gateway"
    environment:
      - UVICORN_RELOAD=${UVICORN_RELOAD:-true}
      - REDIS_URI=redis://redis:6379
      - MONGODB_URI=${MONGODB_URI}
      - PREFECT_API_URL=http://prefect-server:4200/api
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./.data:/app/.data:z
      - ./src:/app/src:z
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 0.25G
        reservations:
          cpus: "0.5"
          memory: 0.25G
    profiles:
      - custom
  prefect_worker:
    image: angeluz07/cc-worker:0.0.1
    build:
      context: .
      dockerfile: ./deploy/workers/cc/Dockerfile
    container_name: prefect_worker
    extra_hosts:
      - "localhost:host-gateway"
    command: >
      sh -c "prefect work-pool create 'local-docker-pool' --type process || true && 
             prefect deploy --all && 
             prefect worker start --pool 'local-docker-pool' --limit 4"
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - QDRANTDB_URI=${QDRANTDB_URI}
      - EMBEDDER_URI=${EMBEDDER_URI}
      - WEBHOOK_URI=${WEBHOOK_URI}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./.data:/app/.data:z
      - ./src:/app/src:z
      - ./prefect.yaml:/app/prefect.yaml:z
    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 4G
        reservations:
          cpus: "2.0"
          memory: 1G
    profiles:
      - custom
