services:
  # --- Base Services ---
  mongodb:
    image: mongo:7.0.8
    container_name: mongo_cc
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
    volumes:
      - ./.mongo_data:/data/db
    command: ["--wiredTigerCacheSizeGB", "0.25"] # Límite interno de Mongo para cache
    deploy:
      resources:
        limits:
          cpus: "0.50" # Máximo 50% de un núcleo de CPU
          memory: 512M # Máximo 512MB de RAM
        reservations:
          memory: 128M # Garantiza al menos 128MB
    profiles:
      - base
  compass:
    image: haohanyang/compass-web:latest
    container_name: compass_web_panel
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Conecta automáticamente al servicio de mongo de arriba
      - CW_MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASS}@mongodb:27017
      - CW_ENABLE_EDIT_CONNECTIONS=true
    depends_on:
      - mongodb
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    profiles:
      - base
  redis:
    image: redis:7.2-alpine
    container_name: redis_cc
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    profiles:
      - base
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight_cc
    ports:
      - "5540:5540"
    environment:
      # Configura la conexión automática apuntando al contenedor de arriba
      - REDIS_EXTERNAL_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    profiles:
      - base
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: qdrant_vector_db
    restart: always
    ports:
      - "6333:6333" # API REST y Web Dashboard
      - "6334:6334" # gRPC (por si lo necesitas más adelante)
    environment:
      - QDRANT__SERVICE__ENABLE_PROFILING=true
    volumes:
      - ./.qdrant_data:/qdrant/storage:z
    deploy:
      resources:
        limits:
          cpus: "0.50" # Máximo 50% de un núcleo de CPU
          memory: 512M # Máximo 512MB de RAM (ideal para tus colecciones de testing)
        reservations:
          memory: 128M # Garantiza al menos 128MB
    profiles:
      - base
  # --- Custom Services ---
  embedding:
    image: angeluz07/embedding:0.0.1 # use local if exists
    build: # if doesnt, build it
      context: .
      dockerfile: ./services/embedding/Dockerfile
    container_name: embedding
    ports:
      - "8001:8001"
    environment:
      - UVICORN_RELOAD=${UVICORN_RELOAD:-false}
    volumes:
      - ./services/embedding/.data:/app/.data:z
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          memory: 256M
    profiles:
      - custom
  downloadapi:
    image: angeluz07/cc-download:0.0.1 # use local if exists
    build: # if doesnt, build it
      context: .
      dockerfile: ./services/download/Dockerfile
    container_name: download_api
    ports:
      - "8002:8002"
    environment:
      - UVICORN_RELOAD=${UVICORN_RELOAD:-false}
      - REDIS_URI=redis://redis:6379
    volumes:
      - ./.data:/app/.data:z
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          memory: 256M
    profiles:
      - custom
  downloadworker:
    image: angeluz07/cc-download:0.0.1 # use local if exists
    build: # if doesnt, build it
      context: .
      dockerfile: ./services/download/Dockerfile
    container_name: download_worker
    environment:
      - UVICORN_RELOAD=${UVICORN_RELOAD:-false}
      - REDIS_URI=redis://redis:6379
      - PYTHONUNBUFFERED=1
    volumes:
      - ./.data:/app/.data:z
    command: taskiq worker workers.broker:broker workers.download --workers 2
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          memory: 256M
    profiles:
      - custom
  videobuildapi:
    image: angeluz07/cc-video-build:0.0.1 # use local if exists
    build: # if doesnt, build it
      context: .
      dockerfile: ./services/video-build/Dockerfile
    container_name: video_build_api
    ports:
      - "8003:8003"
    environment:
      - UVICORN_RELOAD=${UVICORN_RELOAD:-false}
      - REDIS_URI=redis://redis:6379
    volumes:
      - ./.data:/app/.data:z
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          memory: 256M
    profiles:
      - custom
  video_build_worker:
    image: angeluz07/cc-video-build:0.0.1 # use local if exists
    build: # if doesnt, build it
      context: .
      dockerfile: ./services/video-build/Dockerfile
    container_name: video_build_worker
    environment:
      - UVICORN_RELOAD=${UVICORN_RELOAD:-false}
      - REDIS_URI=redis://redis:6379
      - PYTHONUNBUFFERED=1
    volumes:
      - ./.data:/app/.data:z
    command: taskiq worker workers.broker:broker workers.video_build --workers 2
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          memory: 256M
    profiles:
      - custom
